<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact</title>
<link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
<h1>Contact Me</h1>
</header>

<main>

<form aria-label="Contact Form">

<div>
<label for="name">Name</label>

<input
id="name"
type="text"
required>
</div>

<div>
<label for="email">Email</label>

<input
id="email"
type="email"
required>
</div>

<div>
<label for="message">Message</label>

<textarea
id="message"
required></textarea>
</div>

<button type="submit">
Send Message
</button>

</form>

</main>

</body>
</html>
